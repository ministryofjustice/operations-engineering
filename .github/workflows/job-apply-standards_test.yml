name: 🤖 Apply Standards to Repos Test

on:
  push:
    branches: [aga-test-services]
  workflow_dispatch: # So we can trigger manually

jobs:
  configure-standards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pipenv"
      - name: Install Pipenv
        run: |
          pip install pipenv
          pipenv install
      - run: |
          output=$(pipenv run python3 -m bin.configure_standards)
          echo "$output"
        env:
          ADMIN_GITHUB_TOKEN: ${{ secrets.OPS_ENG_GENERAL_ADMIN_BOT_PAT }}
          KPI_DASHBOARD_URL: ${{ secrets.KPI_DASHBOARD_POC_URL }}
          KPI_DASHBOARD_API_KEY: ${{ secrets.KPI_DASHBOARD_POC_API_KEY }}
